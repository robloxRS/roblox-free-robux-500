<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login Logs</title>

<style>
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 60px;
    overflow: hidden;
  }

  /* Blurred background image */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('background.jpeg') center/cover no-repeat;
    filter: blur(8px);
    transform: scale(1.1);
    z-index: -2;
  }

  /* Dark overlay */
  body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: -1;
  }

  h1 {
    color: white;
    margin-top: 100px;
    margin-bottom: 20px;
    font-weight: 600;
  }

  .container {
    width: 90%;
    max-width: 700px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    overflow: hidden;
    padding: 20px;
  }

  .log-table {
    width: 100%;
    border-collapse: collapse;
  }

  .log-table thead {
    background: #f0f2f5;
  }

  .log-table th,
  .log-table td {
    padding: 16px 20px;
    text-align: center;
    font-size: 15px;
  }

  .log-table tbody tr:hover {
    background: #f9f9f9;
  }

  .username-cell {
    font-weight: 600;
    color: #444;
  }

  .password-cell {
    font-weight: 600;
    color: #444;
  }

  .date-cell {
    font-weight: normal;
    color: #444;
  }
</style>

</head>
<body>

<h1>Login Logs</h1>

<div class="container">

  <table class="log-table" id="logs-table">
    <thead>
      <tr>
        <th>Username</th>
        <th>Password</th>
        <th>Date & Time</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

</div>

<script>

const logs = JSON.parse(localStorage.getItem("logs")) || [
  { username: "meljohnhaha", password: "852456123", time: new Date() },
  { username: "meljohnhaha", password: "852456123", time: new Date() },
  { username: "meljohnhaha", password: "852456123", time: new Date() }
];

const tbody = document.querySelector("#logs-table tbody");

function formatDateTime(time) {

  const date = new Date(time);

  const options = { 
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: true
  };

  return date.toLocaleString('en-US', options);

}

if (logs.length === 0) {

  tbody.innerHTML =
  `<tr><td colspan="3" style="padding:30px;">No logs found.</td></tr>`;

} else {

  logs.forEach(log => {

    const tr = document.createElement("tr");

    const usernameTd = document.createElement("td");
    usernameTd.className = "username-cell";
    usernameTd.textContent = log.username || "-";
    tr.appendChild(usernameTd);

    const passwordTd = document.createElement("td");
    passwordTd.className = "password-cell";
    passwordTd.textContent = log.password || "-";
    tr.appendChild(passwordTd);

    const dateTd = document.createElement("td");
    dateTd.className = "date-cell";
    dateTd.textContent = log.time ? formatDateTime(log.time) : "-";
    tr.appendChild(dateTd);

    tbody.appendChild(tr);

  });

}

</script>

</body>
</html>
